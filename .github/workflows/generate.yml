name: Auto Generate plist and apps.json

on:
  push:
    branches: [ main ]
    paths:
      - 'ipa/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run generate script
        run: node generate.js

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json plist/ icons/ ipa/.gitkeep
          git diff --staged --quiet || (git commit -m "自动生成应用列表 [skip ci]" && git push)